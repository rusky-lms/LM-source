<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LM-Source</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <img src="assets/logo-icon48.png" alt="LM-Source Logo" class="logo">
      <h1>LM-Source</h1>
    </header>
    
    <main class="popup-content">
      <p class="status-text">LM-Source Ready</p>
      <p class="platform-indicator">Detecting platform...</p>
      
      <!-- Feature buttons -->
      <div class="feature-buttons">
        <button id="btn-extract" class="feature-btn" disabled>
          <span>✦ Extract Context</span>
        </button>
        <button id="btn-pinboard" class="feature-btn" disabled>
          <span>📌 Pinboard</span>
        </button>
        <button id="btn-highlights" class="feature-btn" disabled>
          <span>🖍 Highlights</span>
        </button>
        <button id="btn-handoff" class="feature-btn" disabled>
          <span>🚀 Context Handoff</span>
        </button>
      </div>

      <!-- Delete controls (P2.4) -->
      <div class="feature-buttons secondary-buttons">
        <button id="btn-toggle-deleted" class="feature-btn secondary-btn" disabled>
          <span id="btn-toggle-deleted-label">👁 Show Deleted</span>
        </button>
        <button id="btn-bulk-delete" class="feature-btn secondary-btn" disabled>
          <span>🗑 Bulk Delete</span>
        </button>
      </div>

      <div class="settings-link">
        <button id="btn-settings" class="text-btn">Settings</button>
      </div>
    </main>
    
    <footer class="popup-footer">
      <span class="version">v1.1.0</span>
    </footer>
  </div>
  
  <script type="module" src="./popup.js"></script>
</body>
</html>
